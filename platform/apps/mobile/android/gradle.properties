org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# If you hit "Failed to apply plugin... Minimum supported Gradle version" or
# jlink/JdkImageTransform errors, your default JDK is likely 21, which has a
# known incompatibility with AGP 8.1.x (see BUILD_INSTRUCTIONS.md). Point
# Gradle at a JDK 17 install instead by uncommenting and editing the line below:
# org.gradle.java.home=/path/to/jdk-17
