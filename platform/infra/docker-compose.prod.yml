version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: temptations_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: always

  api:
    build:
      context: ../apps/api
      target: production
    container_name: temptations_api
    expose:
      - "8000"
    env_file:
      - ../apps/api/.env
    depends_on:
      - redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: temptations_redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
